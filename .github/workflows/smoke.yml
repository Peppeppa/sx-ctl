name: Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    name: Run quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Ensure scripts are executable
        run: |
          chmod +x sx-ctl.sh
          chmod +x sx-ctl-basic.sh
          chmod +x install.sh
          chmod +x uninstall.sh
          chmod +x tests/*.sh
          find scripts -type f -name '*.sh' -exec chmod +x {} \;
          find templates -type f -name '*.sh' -exec chmod +x {} \;

      - name: Run quality checks
        run: |
          sh tests/check.sh
